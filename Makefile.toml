[config]
default_to_workspace = false

[env]
PROJECT_NAME = "token-proxy"
BACKEND_PORT = "3000"
FRONTEND_PORT = "5173"

# ─── 开发模式 ────────────────────────────────────────

[tasks.dev]
description = "启动开发模式 (前端 Vite HMR + 后端 cargo watch)"
run_task = { name = ["dev-frontend", "dev-backend"], parallel = true }

[tasks.dev-frontend]
description = "启动前端 Vite dev server"
command = "npm"
args = ["run", "dev"]

[tasks.dev-backend]
description = "启动后端 (cargo watch, 文件变更自动重编译重启)"
env = { SERVER_PORT = "${BACKEND_PORT}" }
command = "cargo"
args = ["watch", "-x", "run"]

# ─── 生产构建 ────────────────────────────────────────

[tasks.build]
clear = true
description = "生产构建 (前端 npm build + 后端 cargo build --release)"
run_task = { name = ["build-frontend", "build-backend"], parallel = false }

[tasks.build-frontend]
description = "构建前端静态资源"
command = "npm"
args = ["run", "build"]

[tasks.build-backend]
description = "构建后端 (release, 嵌入前端产物)"
command = "cargo"
args = ["build", "--release"]

# ─── 预览 ────────────────────────────────────────────

[tasks.preview]
description = "构建并预览生产版本"
run_task = { name = ["build", "run-release"], parallel = false }

[tasks.run-release]
description = "运行 release 二进制"
command = "cargo"
args = ["run", "--release"]

# ─── 数据库迁移 ──────────────────────────────────────

[tasks.migrate]
description = "数据库迁移 (用法: cargo make migrate -- <up|down|fresh|status> [steps])"
command = "cargo"
args = ["run", "--", "migrate", "${@}"]

# ─── 工具 ────────────────────────────────────────────

[tasks.check]
description = "检查代码 (cargo check + TypeScript 类型检查)"
run_task = { name = ["check-backend", "check-frontend"], parallel = true }

[tasks.check-backend]
command = "cargo"
args = ["check"]

[tasks.check-frontend]
command = "npx"
args = ["tsc", "--noEmit"]

[tasks.fmt]
description = "代码格式化"
command = "cargo"
args = ["fmt"]

[tasks.clippy]
description = "Clippy 代码检查"
command = "cargo"
args = ["clippy", "--", "-D", "warnings"]

[tasks.test]
description = "运行所有测试"
command = "cargo"
args = ["test"]

[tasks.clean]
description = "清理构建产物"
command = "cargo"
args = ["clean"]
