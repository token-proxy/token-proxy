<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Token Proxy</title>
  </head>
  <body>
    <script>
      try {
        var theme = localStorage.getItem('theme_mode');
        if (theme === 'dark' || ((theme === null || theme === 'system') && matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.body.setAttribute('theme-mode', 'dark');
        }
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src-dashboard/main.tsx"></script>
  </body>
</html>
