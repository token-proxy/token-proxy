name: 发布

on:
  push:
    tags:
      - '*.*.*'
      - '*.*.*-*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check-backend:
    name: 检查后端代码
    uses: ./.github/workflows/check-backend.yml

  check-frontend:
    name: 检查前端代码
    uses: ./.github/workflows/check-frontend.yml

  run-unit-tests:
    name: 运行单元测试
    uses: ./.github/workflows/run-unit-tests.yml

  build-and-push:
    name: 构建并推送镜像
    needs: [check-backend, check-frontend, run-unit-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=buildkit-release
          cache-to: type=gha,scope=buildkit-release,mode=max
