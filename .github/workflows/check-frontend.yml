name: 检查前端代码

on:
  workflow_call:
  pull_request:
    branches: [main]
    paths:
      - 'src-dashboard/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.json'
      - 'tsconfig.*.json'
      - 'vite.config.ts'
      - '.github/workflows/check-frontend.yml'
  workflow_dispatch:

jobs:
  check:
    name: 检查前端代码
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: Lint 检查
        run: pnpm run lint

      - name: TypeScript 类型检查
        run: pnpm exec tsc --noEmit
